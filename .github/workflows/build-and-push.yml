name: Build and Push to Azure ACR

on:
  workflow_dispatch:
    inputs:
      api-gateway:
        description: 'Build api-gateway'
        type: boolean
        default: false
      user:
        description: 'Build user'
        type: boolean
        default: false
      organization:
        description: 'Build organization'
        type: boolean
        default: false
      agent-provisioning:
        description: 'Build agent-provisioning'
        type: boolean
        default: false
      agent-service:
        description: 'Build agent-service'
        type: boolean
        default: false
      connection:
        description: 'Build connection'
        type: boolean
        default: false
      ecosystem:
        description: 'Build ecosystem'
        type: boolean
        default: false
      issuance:
        description: 'Build issuance'
        type: boolean
        default: false
      verification:
        description: 'Build verification'
        type: boolean
        default: false
      webhook:
        description: 'Build webhook'
        type: boolean
        default: false
      notification:
        description: 'Build notification'
        type: boolean
        default: false
      ledger:
        description: 'Build ledger'
        type: boolean
        default: false
      utility:
        description: 'Build utility'
        type: boolean
        default: false
      marketplace:
        description: 'Build marketplace'
        type: boolean
        default: false
      build_all:
        description: 'Build all prod services'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_NAME: phenixprodacr
  ACR_SERVER: phenixprodacr.azurecr.io
  MANIFEST_ENV: prod

jobs:
  select-services:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Build service list
        id: set-matrix
        run: |
          ALL_SERVICES="utility notification ledger agent-provisioning user organization agent-service connection ecosystem issuance verification webhook api-gateway marketplace"

          if [ "${{ github.event.inputs.build_all }}" = "true" ]; then
            SERVICES="$ALL_SERVICES"
          else
            SERVICES=""
            [ "${{ github.event.inputs['api-gateway'] }}" = "true" ] && SERVICES="$SERVICES api-gateway"
            [ "${{ github.event.inputs.user }}" = "true" ] && SERVICES="$SERVICES user"
            [ "${{ github.event.inputs.organization }}" = "true" ] && SERVICES="$SERVICES organization"
            [ "${{ github.event.inputs['agent-provisioning'] }}" = "true" ] && SERVICES="$SERVICES agent-provisioning"
            [ "${{ github.event.inputs['agent-service'] }}" = "true" ] && SERVICES="$SERVICES agent-service"
            [ "${{ github.event.inputs.connection }}" = "true" ] && SERVICES="$SERVICES connection"
            [ "${{ github.event.inputs.ecosystem }}" = "true" ] && SERVICES="$SERVICES ecosystem"
            [ "${{ github.event.inputs.issuance }}" = "true" ] && SERVICES="$SERVICES issuance"
            [ "${{ github.event.inputs.verification }}" = "true" ] && SERVICES="$SERVICES verification"
            [ "${{ github.event.inputs.webhook }}" = "true" ] && SERVICES="$SERVICES webhook"
            [ "${{ github.event.inputs.notification }}" = "true" ] && SERVICES="$SERVICES notification"
            [ "${{ github.event.inputs.ledger }}" = "true" ] && SERVICES="$SERVICES ledger"
            [ "${{ github.event.inputs.utility }}" = "true" ] && SERVICES="$SERVICES utility"
            [ "${{ github.event.inputs.marketplace }}" = "true" ] && SERVICES="$SERVICES marketplace"
          fi

          SERVICES=$(echo "$SERVICES" | xargs)
          if [ -z "$SERVICES" ]; then
            echo "::error::No services selected"
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          JSON_ARRAY=$(echo "$SERVICES" | tr ' ' '\n' | jq -R . | jq -s -c .)
          echo "matrix={\"service\":$JSON_ARRAY}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build:
    needs: select-services
    if: needs.select-services.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.select-services.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workflow was dispatched from main
        run: test "$GITHUB_REF" = "refs/heads/main"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfiles/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ACR_SERVER }}/phenix-platform-${{ matrix.service }}:latest
            ${{ env.ACR_SERVER }}/phenix-platform-${{ matrix.service }}:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: [select-services, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: phenix-iac-manifests

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/phenix-iac-manifests
          token: ${{ steps.app-token.outputs.token }}
          path: manifests

      - name: Update prod image tags
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          SERVICES='${{ needs.select-services.outputs.matrix }}'

          cd manifests/apps/${{ env.MANIFEST_ENV }}
          BUILT_SERVICES=$(echo "$SERVICES" | jq -r '.service[]' 2>/dev/null || echo "")

          for svc in $BUILT_SERVICES; do
            echo "Updating prod image tag for: $svc"
            IMAGE_POLICY_MARKER='# {"$imagepolicy": "flux-system:phenix-platform-'"$svc"':tag"}'
            sed -i "s|^  # - \.\./base/phenix-platform/${svc}\$|  - ../base/phenix-platform/${svc}|" kustomization.yaml
            if grep -q "phenix-platform-$svc" kustomization.yaml; then
              sed -i "/phenix-platform-$svc/,/newTag:/s|newTag: .*|newTag: $SHORT_SHA $IMAGE_POLICY_MARKER|" kustomization.yaml
            else
              sed -i "/^patches:/i\\  - name: phenixdevacr.azurecr.io/phenix-platform-$svc\\n    newName: ${{ env.ACR_SERVER }}/phenix-platform-$svc\\n    newTag: $SHORT_SHA $IMAGE_POLICY_MARKER" kustomization.yaml
            fi
          done

      - name: Commit and push
        run: |
          cd manifests
          SERVICES='${{ needs.select-services.outputs.matrix }}'
          BUILT_SERVICES=$(echo "$SERVICES" | jq -r '.service | join(", ")' 2>/dev/null || echo "unknown")

          git config user.name "phenix-ci[bot]"
          git config user.email "phenix-ci[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "[prod] Update phenix-platform ($BUILT_SERVICES) to ${GITHUB_SHA::8}"
            git push
          else
            echo "No changes to commit"
          fi
